<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .header p {
            color: #8892b0;
            margin-top: 5px;
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: #a8b3cf;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .card-icon.temp {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .card-icon.light {
            background: linear-gradient(135deg, #ffd93d, #f0c808);
        }

        .card-icon.power {
            background: linear-gradient(135deg, #6bcb77, #4caf50);
        }

        .card-icon.humidity {
            background: linear-gradient(135deg, #4dabf7, #228be6);
        }

        .card-icon.co2 {
            background: linear-gradient(135deg, #be4bdb, #9775fa);
        }

        .card-icon.activity {
            background: linear-gradient(135deg, #ffa8a8, #ff6b6b);
        }

        .value-display {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .value {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
        }

        .unit {
            font-size: 18px;
            color: #8892b0;
        }

        .progress-bar {
            margin-top: 16px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .progress-fill.temp {
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
        }

        .progress-fill.light {
            background: linear-gradient(90deg, #ffd93d, #f0c808);
        }

        .progress-fill.humidity {
            background: linear-gradient(90deg, #4dabf7, #228be6);
        }

        .progress-fill.co2 {
            background: linear-gradient(90deg, #be4bdb, #9775fa);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 12px;
        }

        .status-badge.online {
            background: rgba(107, 203, 119, 0.2);
            color: #6bcb77;
        }

        .status-badge.offline {
            background: rgba(238, 90, 90, 0.2);
            color: #ee5a5a;
        }

        .status-badge.warning {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d;
        }

        .switch-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
        }

        .switch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .switch-label {
            font-size: 14px;
            color: #a8b3cf;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background: linear-gradient(135deg, #6bcb77, #4caf50);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        .activity-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6bcb77;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .activity-text {
            font-size: 13px;
            color: #a8b3cf;
            flex: 1;
        }

        .activity-time {
            font-size: 12px;
            color: #6b7280;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #6b7280;
            font-size: 13px;
        }

        .update-time {
            color: #00d4ff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 设备监控面板</h1>
        <p>实时监控 · 智能控制 · 数据可视化</p>
    </div>

    <div class="dashboard">
        <!-- 温度传感器 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">温度传感器</span>
                <div class="card-icon temp">🌡️</div>
            </div>
            <div class="value-display">
                <span class="value" id="temp-value">23</span>
                <span class="unit">°C</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill temp" id="temp-progress" style="width: 46%"></div>
            </div>
            <span class="status-badge online">
                <span>●</span> 在线
            </span>
        </div>

        <!-- 光照传感器 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">光照强度</span>
                <div class="card-icon light">☀️</div>
            </div>
            <div class="value-display">
                <span class="value" id="light-value">680</span>
                <span class="unit">lux</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill light" id="light-progress" style="width: 68%"></div>
            </div>
            <span class="status-badge online">
                <span>●</span> 在线
            </span>
        </div>

        <!-- 湿度传感器 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">湿度传感器</span>
                <div class="card-icon humidity">💧</div>
            </div>
            <div class="value-display">
                <span class="value" id="humidity-value">45</span>
                <span class="unit">%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill humidity" id="humidity-progress" style="width: 45%"></div>
            </div>
            <span class="status-badge online">
                <span>●</span> 在线
            </span>
        </div>

        <!-- CO2传感器 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">CO₂ 浓度</span>
                <div class="card-icon co2">🌬️</div>
            </div>
            <div class="value-display">
                <span class="value" id="co2-value">420</span>
                <span class="unit">ppm</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill co2" id="co2-progress" style="width: 42%"></div>
            </div>
            <span class="status-badge online">
                <span>●</span> 在线
            </span>
        </div>

        <!-- 设备控制 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">设备控制</span>
                <div class="card-icon power">🔌</div>
            </div>
            <div class="switch-container">
                <div class="switch-item">
                    <span class="switch-label">空调</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="ac-switch">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="switch-item">
                    <span class="switch-label">灯光</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="light-switch" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="switch-item">
                    <span class="switch-label">加湿器</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="humidifier-switch">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="switch-item">
                    <span class="switch-label">净化器</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="purifier-switch" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 活动日志 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">活动日志</span>
                <div class="card-icon activity">📝</div>
            </div>
            <div class="activity-list" id="activity-list">
                <div class="activity-item">
                    <div class="activity-dot"></div>
                    <span class="activity-text">净化器已开启</span>
                    <span class="activity-time">2分钟前</span>
                </div>
                <div class="activity-item">
                    <div class="activity-dot"></div>
                    <span class="activity-text">光照强度变化</span>
                    <span class="activity-time">5分钟前</span>
                </div>
                <div class="activity-item">
                    <div class="activity-dot"></div>
                    <span class="activity-text">温度传感器更新</span>
                    <span class="activity-time">8分钟前</span>
                </div>
                <div class="activity-item">
                    <div class="activity-dot"></div>
                    <span class="activity-text">灯光已开启</span>
                    <span class="activity-time">15分钟前</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        数据更新时间：<span class="update-time" id="update-time">刚刚</span>
    </div>

    <script>
        // 模拟传感器数据更新
        function updateSensorData() {
            // 温度 18-35°C
            const temp = Math.floor(Math.random() * 18) + 18;
            document.getElementById('temp-value').textContent = temp;
            document.getElementById('temp-progress').style.width = `${((temp - 10) / 40) * 100}%`;

            // 光照 0-1000 lux
            const light = Math.floor(Math.random() * 800) + 200;
            document.getElementById('light-value').textContent = light;
            document.getElementById('light-progress').style.width = `${light / 10}%`;

            // 湿度 30-70%
            const humidity = Math.floor(Math.random() * 41) + 30;
            document.getElementById('humidity-value').textContent = humidity;
            document.getElementById('humidity-progress').style.width = `${humidity}%`;

            // CO2 350-1000 ppm
            const co2 = Math.floor(Math.random() * 400) + 350;
            document.getElementById('co2-value').textContent = co2;
            document.getElementById('co2-progress').style.width = `${(co2 / 10)}%`;

            // 更新时间
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            document.getElementById('update-time').textContent = timeStr;
        }

        // 开关控制事件
        const switches = ['ac-switch', 'light-switch', 'humidifier-switch', 'purifier-switch'];
        const deviceNames = {
            'ac-switch': '空调',
            'light-switch': '灯光',
            'humidifier-switch': '加湿器',
            'purifier-switch': '净化器'
        };

        switches.forEach(switchId => {
            document.getElementById(switchId).addEventListener('change', function(e) {
                const deviceName = deviceNames[switchId];
                const status = e.target.checked ? '开启' : '关闭';
                
                // 添加活动日志
                const activityList = document.getElementById('activity-list');
                const newItem = document.createElement('div');
                newItem.className = 'activity-item';
                newItem.innerHTML = `
                    <div class="activity-dot"></div>
                    <span class="activity-text">${deviceName}已${status}</span>
                    <span class="activity-time">刚刚</span>
                `;
                activityList.insertBefore(newItem, activityList.firstChild);
                
                // 保持最多4条日志
                while (activityList.children.length > 4) {
                    activityList.removeChild(activityList.lastChild);
                }
            });
        });

        // 定时更新传感器数据（每5秒）
        setInterval(updateSensorData, 5000);

        // 初始化
        updateSensorData();
    </script>
</body>
</html>
